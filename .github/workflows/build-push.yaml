# [CI] master 푸시 시 Backend Docker 이미지 빌드 -> ECR 푸시
# 이미지 태그는 Git Commit SHA 앞 7자리를 사용

name: Build and Push Backend Image to ECR

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2


      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2


      - name: Check Dockerfile
        run: test -f Dockerfile


      - name: Build and Push Backend Image
        shell: bash
        run: |
          IMAGE="201243087060.dkr.ecr.ap-northeast-2.amazonaws.com/soundcloud-prod/backend"
          TAG="${GITHUB_SHA::7}"

          echo "Backend Image: ${IMAGE}:${TAG}"

          docker build \
            -t "${IMAGE}:${TAG}" \
            .

          docker push "${IMAGE}:${TAG}"