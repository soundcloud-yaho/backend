# postgres.yaml // 로컬 테스트용

apiVersion: apps/v1
kind: Deployment
metadata:
  name: football-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: football-postgres
  template:
    metadata:
      labels:
        app: football-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: football-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: football-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: football-secret
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: football-postgres
spec:
  selector:
    app: football-postgres
  ports:
    - port: 5432
      targetPort: 5432