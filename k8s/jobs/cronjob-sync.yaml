# cronjob-sync.yaml

apiVersion: batch/v1
kind: CronJob
metadata:
  name: worldcup-sync
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: <ECR_URI>/soundcloud-prod/backend:<SHA7>
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "sync.sync_matches"]
              envFrom:
                - configMapRef:
                    name: football-config
                - secretRef:
                    name: football-secret