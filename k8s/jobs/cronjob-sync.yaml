# cronjob-sync.yaml

apiVersion: batch/v1
kind: CronJob
metadata:
  name: worldcup-sync
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: 839931788259.dkr.ecr.ap-northeast-2.amazonaws.com/backend:latest
              imagePullPolicy: Always
              command: ["python", "-m", "sync.sync_matches"]
              env:
                - name: WRITABLE_URL
                  valueFrom:
                    secretKeyRef:
                      name: backend-db-secret
                      key: WRITABLE_URL
                - name: READONLY_URL
                  valueFrom:
                    secretKeyRef:
                      name: backend-db-secret
                      key: READONLY_URL
                - name: FOOTBALL_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: football-api-secret
                      key: FOOTBALL_DATA_API_KEY